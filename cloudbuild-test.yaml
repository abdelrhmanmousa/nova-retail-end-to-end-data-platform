# Runs on every pull request. Fast validation only - no image builds, no
# deployment. A PR can't be merged with a red check here (once branch
# protection is enabled on GitHub to require this check).

steps:
  - id: dbt-deps
    name: 'python:3.11-slim'
    dir: 'dbt_nova_retail'
    entrypoint: bash
    args:
      - -c
      - |
        pip install --no-cache-dir dbt-bigquery==1.8.2
       
        dbt deps --profiles-dir .

  - id: dbt-compile
    name: 'python:3.11-slim'
    dir: 'dbt_nova_retail'
    entrypoint: bash
    args:
      - -c
      - |
        pip install --no-cache-dir dbt-bigquery==1.8.2
       
        dbt compile --profiles-dir .

  - id: dbt-test
    name: 'python:3.11-slim'
    dir: 'dbt_nova_retail'
    entrypoint: bash
    args:
      - -c
      - |
        pip install --no-cache-dir dbt-bigquery==1.8.2
        dbt test --profiles-dir .

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 600s
