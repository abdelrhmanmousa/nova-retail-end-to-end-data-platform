version: 2

models:
  - name: dim_customers
    description: "Customer dimension"
    columns:
      - name: customer_key
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: dim_products
    description: "Product dimension, enriched with latest supplier stock/cost"
    columns:
      - name: product_key
        tests:
          - unique
          - not_null
      - name: product_id
        tests:
          - unique
          - not_null

  - name: dim_date
    description: "Date spine dimension"
    columns:
      - name: date
        tests:
          - unique
          - not_null

  - name: dim_currency_rates
    description: "Latest exchange rate snapshot per currency"
    columns:
      - name: currency_code
        tests:
          - unique
          - not_null

  - name: fact_orders
    description: "One row per order"
    columns:
      - name: order_key
        tests:
          - unique
          - not_null
      - name: customer_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_key
      - name: status
        tests:
          - accepted_values:
              values: ['completed', 'shipped', 'processing', 'cancelled', 'returned']

  - name: fact_order_items
    description: "One row per order line item"
    columns:
      - name: order_item_key
        tests:
          - unique
          - not_null
      - name: order_key
        tests:
          - not_null
          - relationships:
              to: ref('fact_orders')
              field: order_key
      - name: product_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_key

  - name: fact_payments
    description: "One row per payment"
    columns:
      - name: payment_key
        tests:
          - unique
          - not_null
      - name: order_key
        tests:
          - not_null
          - relationships:
              to: ref('fact_orders')
              field: order_key

  - name: fact_clickstream_events
    description: "One row per clickstream event"
    columns:
      - name: event_key
        tests:
          - unique
          - not_null
      - name: customer_key
        tests:
          - relationships:
              to: ref('dim_customers')
              field: customer_key
      - name: product_key
        tests:
          - relationships:
              to: ref('dim_products')
              field: product_key