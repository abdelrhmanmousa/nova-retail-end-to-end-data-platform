# Cloud Build pipeline for Nova Retail - deploy stage.
# Triggered on push to main. Builds images DIRECTLY (docker build/push),
# no nested `gcloud builds submit` calls - faster, fewer permissions
# needed, and logs stay in one place per step.

steps:
  # --- Clickstream Dataflow Flex Template image ---
  - id: build-clickstream-image
    name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_CLICKSTREAM_IMAGE}', 'Pipelines/dataflow']

  - id: push-clickstream-image
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_CLICKSTREAM_IMAGE}']

  - id: register-clickstream-template
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud dataflow flex-template build "${_TEMPLATE_GCS_PATH}" \
          --image "${_CLICKSTREAM_IMAGE}" \
          --sdk-language PYTHON \
          --metadata-file Pipelines/dataflow/metadata.json

  # --- Batch producers image ---
  - id: build-batch-producers-image
    name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'data_sources/Dockerfile.batch', '-t', '${_BATCH_IMAGE}', 'data_sources']

  - id: push-batch-producers-image
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_BATCH_IMAGE}']

  # --- dbt image ---
  - id: build-dbt-image
    name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_DBT_IMAGE}', 'dbt_nova_retail']

  - id: push-dbt-image
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_DBT_IMAGE}']

  # --- Deploy DAGs ---
  - id: sync-dags
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gsutil
    args: ['-m', 'rsync', '-r', './dags', '${_COMPOSER_DAG_BUCKET}']

  # --- Infra review (plan only, never auto-apply) ---
  - id: terraform-plan
    name: 'hashicorp/terraform:1.9'
    dir: 'Infrastructure_Terraform'
    entrypoint: sh
    args:
      - -c
      - |
        terraform init -input=false
        terraform plan -input=false -var-file=terraform.tfvars
    env:
      # These map Cloud Build variables to Terraform variables
      - 'TF_VAR_project_id=$PROJECT_ID'
      - 'TF_VAR_region=us-central1'
      - 'TF_VAR_cloudsql_instance_connection_name=$_CLOUDSQL_CONNECTION'
      - 'TF_VAR_cloudsql_public_ip=$_CLOUDSQL_IP'
      - 'TF_VAR_cloudsql_password=$_CLOUDSQL_PASSWORD'
      # Add any other variables your variables.tf file requires:
      # - 'TF_VAR_bucket_name=my-bucket-name'
substitutions:
  _CLICKSTREAM_IMAGE: 'us-central1-docker.pkg.dev/${PROJECT_ID}/nova-retail-pipelines/clickstream-pipeline:latest'
  _BATCH_IMAGE: 'us-central1-docker.pkg.dev/${PROJECT_ID}/nova-retail-pipelines/batch-producers:latest'
  _DBT_IMAGE: 'us-central1-docker.pkg.dev/${PROJECT_ID}/nova-retail-pipelines/dbt-nova-retail:latest'
  _TEMPLATE_GCS_PATH: 'gs://${PROJECT_ID}-pipeline-artifacts-dev/templates/clickstream-pipeline.json'
  _COMPOSER_DAG_BUCKET: 'gs://us-central1-nova-retail-orc-7cf14dd9-bucket/dags'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
